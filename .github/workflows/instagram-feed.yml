name: Actualizar feed de Instagram

on:
  schedule:
    - cron: '0 8 * * *'   # Todos los días a las 8 AM UTC
  workflow_dispatch:        # También se puede correr manualmente desde GitHub

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BEHOLD_URL: https://feeds.behold.so/2xMs0ZSJoqAPzTMDQmiH

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Descargar posts desde Behold
        run: |
          mkdir -p public/data
          FEED=$(curl -sf "$BEHOLD_URL" || echo '[]')

          # Behold puede devolver array directo o { posts: [...] }
          echo "$FEED" | jq 'if type == "array" then .[0:5] else (.posts // []) | .[0:5] end' > public/data/instagram-feed.json
          echo "Posts guardados: $(jq length public/data/instagram-feed.json)"

      - name: Guardar cambios en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/instagram-feed.json
          git diff --staged --quiet || (git commit -m "chore: actualizar feed de Instagram" && git push)
