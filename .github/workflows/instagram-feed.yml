name: Actualizar feed de Instagram

on:
  schedule:
    - cron: '0 8 * * *'   # Todos los días a las 8 AM UTC
  workflow_dispatch:        # También se puede correr manualmente desde GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Renovar token y descargar posts
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO:     ${{ github.repository }}
        run: |
          set -e

          # ── 1. Renovar el token antes de que venza (cada 60 días)
          REFRESH=$(curl -sf \
            "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${IG_TOKEN}" \
            || echo '{}')

          NEW_TOKEN=$(echo "$REFRESH" | jq -r '.access_token // empty')
          ACTIVE="${NEW_TOKEN:-$IG_TOKEN}"

          # ── 2. Guardar el token renovado en GitHub Secrets automáticamente
          if [ -n "$NEW_TOKEN" ] && [ "$NEW_TOKEN" != "null" ]; then
            gh secret set INSTAGRAM_TOKEN --body "$NEW_TOKEN" --repo "$REPO"
          fi

          # ── 3. Descargar los últimos 5 posts
          mkdir -p public/data
          FEED=$(curl -sf \
            "https://graph.instagram.com/me/media?fields=id,caption,media_url,media_type,thumbnail_url,permalink,timestamp&limit=5&access_token=${ACTIVE}" \
            || echo '{"data":[]}')

          echo "$FEED" | jq '.data // []' > public/data/instagram-feed.json

      - name: Guardar cambios en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/instagram-feed.json
          git diff --staged --quiet || (git commit -m "chore: actualizar feed de Instagram" && git push)
